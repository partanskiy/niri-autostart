name: Update AUR

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read

jobs:
  update-aur:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install packaging dependencies
        run: pacman -Syu --noconfirm --needed git openssh curl

      - name: Prepare AUR SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          install -dm700 /root/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /root/.ssh/aur
          chmod 600 /root/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > /root/.ssh/known_hosts
          chmod 644 /root/.ssh/known_hosts

      - name: Resolve release tag
        id: version
        run: |
          remote_url="https://github.com/${{ github.repository }}.git"
          head_sha="${{ github.event.workflow_run.head_sha }}"
          tag_name=$(
            git ls-remote --tags "$remote_url" 'refs/tags/v*.*.*' |
              awk -v sha="$head_sha" '$1 == sha && $2 ~ /\^\{\}$/ { sub(/^refs\/tags\//, "", $2); sub(/\^\{\}$/, "", $2); print $2 }' |
              sort -V |
              tail -n1
          )
          if [[ -z "$tag_name" ]]; then
            echo "could not resolve semver tag for workflow head sha" >&2
            exit 1
          fi
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "pkgver=${tag_name#v}" >> "$GITHUB_OUTPUT"

      - name: Render AUR package files
        env:
          REPO_URL: https://github.com/${{ github.repository }}
          PKGVER: ${{ steps.version.outputs.pkgver }}
        run: ./scripts/render-aur-packages.sh "$PKGVER" "$REPO_URL" /tmp/aur-rendered

      - name: Push package updates to AUR
        env:
          PKGVER: ${{ steps.version.outputs.pkgver }}
        run: |
          workdir=$(mktemp -d)
          ssh_cmd='ssh -i /root/.ssh/aur -o IdentitiesOnly=yes -o UserKnownHostsFile=/root/.ssh/known_hosts -o StrictHostKeyChecking=yes'

          for pkg in niri-autostart niri-autostart-bin; do
            GIT_SSH_COMMAND="$ssh_cmd" git clone "ssh://aur@aur.archlinux.org/${pkg}.git" "$workdir/$pkg"
            find "$workdir/$pkg" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cp -a "/tmp/aur-rendered/$pkg/." "$workdir/$pkg/"

            git -C "$workdir/$pkg" config user.name "github-actions[bot]"
            git -C "$workdir/$pkg" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C "$workdir/$pkg" add PKGBUILD .SRCINFO

            if git -C "$workdir/$pkg" diff --cached --quiet; then
              continue
            fi

            git -C "$workdir/$pkg" commit -m "Update to ${PKGVER}"
            GIT_SSH_COMMAND="$ssh_cmd" git -C "$workdir/$pkg" push
          done
