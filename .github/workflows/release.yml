name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: niri-autostart-x86_64-linux.tar.gz
            apt_packages: ""
            linker: ""
          - target: aarch64-unknown-linux-gnu
            archive: niri-autostart-aarch64-linux.tar.gz
            apt_packages: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install target toolchain packages
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target "${TARGET}"
        env:
          TARGET: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}

      - name: Package archive
        run: |
          mkdir -p dist
          staging_dir="dist/${TARGET}"
          mkdir -p "${staging_dir}"
          cp "target/${TARGET}/release/niri-autostart" "${staging_dir}/"
          cp README.md LICENSE "${staging_dir}/"
          tar -C "${staging_dir}" -czf "dist/${ARCHIVE}" niri-autostart README.md LICENSE
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}

      - name: Upload packaged archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/niri-autostart-aarch64-linux.tar.gz \
              dist/niri-autostart-x86_64-linux.tar.gz \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/niri-autostart-aarch64-linux.tar.gz \
              dist/niri-autostart-x86_64-linux.tar.gz \
              --verify-tag \
              --generate-notes
          fi
